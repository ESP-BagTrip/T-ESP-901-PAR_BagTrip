name: BagTrip

services:
  db:
    image: postgres:15
    container_name: BagTrip-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    container_name: BagTrip-api
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src
      - ./api/pyproject.toml:/app/pyproject.toml
      - ./api/uv.lock:/app/uv.lock
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - AMADEUS_CLIENT_ID=${AMADEUS_CLIENT_ID}
      - AMADEUS_CLIENT_SECRET=${AMADEUS_CLIENT_SECRET}
      - AMADEUS_BASE_URL=${AMADEUS_BASE_URL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-BagTrip Agents}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      - GOOGLE_FIREBASE_PROJECT_ID=${GOOGLE_FIREBASE_PROJECT_ID:-bagtrip-7d2d8}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - APPLE_BUNDLE_ID=${APPLE_BUNDLE_ID:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    command: >
      sh -c "
        uv sync &&
        uv run uvicorn src.main:app --host 0.0.0.0 --port 3000 --reload
      "

  admin-panel:
    container_name: BagTrip-admin-panel
    build:
      context: ./admin-panel/application
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./admin-panel/application:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - WATCHPACK_POLLING=true

  # mobile-web:
  #   container_name: BagTrip-mobile-web
  #   build:
  #     context: ./bagtrip
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./bagtrip:/app
  #   environment:
  #     - API_URL=http://localhost:3000

volumes:
  postgres_data:
