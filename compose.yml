name: BagTrip

services:
  db:
    image: postgres:15
    container_name: BagTrip-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    container_name: BagTrip-api
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src
      - ./api/requirements.txt:/app/requirements.txt
      - ./api/requirements-dev.txt:/app/requirements-dev.txt
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - AMADEUS_CLIENT_ID=${AMADEUS_CLIENT_ID}
      - AMADEUS_CLIENT_SECRET=${AMADEUS_CLIENT_SECRET}
      - AMADEUS_BASE_URL=${AMADEUS_BASE_URL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-BagTrip Agents}
    command: >
      sh -c "
        /app/.venv/bin/pip install -q -r requirements.txt -r requirements-dev.txt &&
        /app/.venv/bin/uvicorn src.main:app --host 0.0.0.0 --port 3000 --reload
      "

  # admin-panel:
