# Production stack — usage:
#   docker compose -f compose.prod.yml --env-file .env.production up -d --build
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bagtrip}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bagtrip}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-https://bagtrip.fr}
      COOKIE_DOMAIN: ${API_COOKIE_DOMAIN:-.bagtrip.fr}
      COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: ./admin-panel/application
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-https://api.bagtrip.fr}
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      api:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CADDY_HOST_PORT:-8081}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
