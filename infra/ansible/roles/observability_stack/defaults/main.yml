---
# --- Filesystem layout ---
observability_root: /opt/observability
observability_owner: deploy
observability_group: deploy

# --- Image pinning (digest-pinning is Phase 5 polish) ---
observability_versions:
  prometheus: v2.55.1
  grafana: 11.4.0
  node_exporter: v1.8.2
  cadvisor: v0.55.1
  postgres_exporter: v0.16.0
  redis_exporter: v1.66.0
  blackbox_exporter: v0.25.0
  loki: 3.3.2
  promtail: 3.3.2
  tempo: 2.7.1
  alertmanager: v0.27.0
  falco: 0.39.0

# --- Loopback ports (host-side; never exposed publicly until Phase 1c) ---
observability_prometheus_host_port: 9090
observability_grafana_host_port: 8087

# --- Prometheus retention ---
observability_prometheus_retention_time: "30d"
observability_prometheus_retention_size: "20GB"
observability_scrape_interval: 15s

# --- Loki retention ---
observability_loki_retention_period: "336h"  # 14 days
observability_loki_max_query_lookback: "336h"

# --- Alertmanager configuration ---
# Discord webhook (or compatible; set in group_vars/host_vars or vault).
# When unset, Alertmanager runs but routes go to a no-op `null` receiver —
# alerts still surface in /api/v1/alerts and Grafana, just don't forward.
observability_alertmanager_discord_webhook: ""
observability_alertmanager_resolve_timeout: "5m"

# --- Restic backups (Phase 6) ---
# Local repository by default. To switch to Backblaze B2, set:
#   observability_restic_repository: "b2:<bucket>:bagtrip"
#   observability_restic_b2_account_id / observability_restic_b2_account_key
# (and they'll land in /opt/observability/.env via the env.j2 template).
observability_restic_repository: "/var/backups/bagtrip-restic"
observability_restic_local_repo_path: "/var/backups/bagtrip-restic"
observability_restic_b2_account_id: ""
observability_restic_b2_account_key: ""

observability_restic_retention:
  daily: 7
  weekly: 4
  monthly: 6

observability_restic_backup_schedule: "*-*-* 02:00:00"          # daily 02:00 UTC
observability_restic_restore_test_schedule: "Sun *-*-* 03:00:00"  # weekly Sunday 03:00 UTC

observability_restic_targets:
  - name: bagtrip-prod
    container: bagtrip-postgres-1
    env_file: /opt/bagtrip/.env.production
  - name: bagtrip-preprod
    container: bagtrip-preprod-postgres-1
    env_file: /opt/bagtrip-preprod/.env.production

# node_exporter textfile collector — Restic writes Prometheus metrics here
# from each backup / restore-test run.
observability_textfile_dir: /var/lib/node_exporter/textfile

# --- BagTrip stack network names (external, must already exist) ---
observability_bagtrip_prod_network: bagtrip_default
observability_bagtrip_preprod_network: bagtrip-preprod_default

# --- BagTrip stack container names (must match the running stacks) ---
observability_bagtrip_prod_postgres_container: bagtrip-postgres-1
observability_bagtrip_preprod_postgres_container: bagtrip-preprod-postgres-1
observability_bagtrip_prod_redis_container: bagtrip-redis-1
observability_bagtrip_preprod_redis_container: bagtrip-preprod-redis-1

# --- Source-of-truth env files (read at deploy time to derive postgres creds) ---
observability_bagtrip_prod_env_file: /opt/bagtrip/.env.production
observability_bagtrip_preprod_env_file: /opt/bagtrip-preprod/.env.production

# --- Grafana credentials (admin password generated on first deploy, persisted in .env) ---
observability_grafana_admin_user: admin

# --- Public exposure via edge Caddy (Cloudflare-fronted) ---
# Set observability_expose_grafana_publicly: false to skip the edge vhost block.
observability_expose_grafana_publicly: true
observability_grafana_public_hostname: grafana.bagtrip.fr
observability_edge_caddyfile: /opt/edge/Caddyfile
observability_edge_container: edge-caddy

# --- Blackbox probe targets (Phase 1a baseline; expanded in Phase 7) ---
observability_blackbox_targets:
  - https://bagtrip.fr
  - https://api.bagtrip.fr
  - https://dev.bagtrip.fr
  - https://api.dev.bagtrip.fr
  - https://monitoring.bagtrip.fr
