---
# Top-level entry point for the BagTrip VPS.
# Use --tags to scope to a phase:
#   --tags baseline       : Phase 0 only (read-only assertions)
#   --tags observability  : Phase 1 (deploy /opt/observability)

- name: Converge BagTrip VPS
  hosts: bagtrip_vps
  gather_facts: true
  roles:
    - role: common
      tags: [common, baseline]
    - role: observability_stack
      tags: [observability, phase1]
