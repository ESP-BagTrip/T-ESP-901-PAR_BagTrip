---
# BagTrip VPS inventory.
#
# Connection uses the local SSH alias `yanis` (declared in ~/.ssh/config) so we
# inherit ProxyJump / IdentityFile / known_hosts hygiene from the user's setup.
# `ansible_host` is the alias name, not the public IP — the SSH client resolves it.

all:
  hosts:
    vps_prod:
      ansible_host: yanis
      ansible_user: ubuntu
      ansible_python_interpreter: /usr/bin/python3
  children:
    bagtrip_vps:
      hosts:
        vps_prod:
