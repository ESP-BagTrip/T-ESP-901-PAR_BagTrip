name: CI Quality Gates

on:
  push:
    branches: [main, develop, feat/SMP-54-add-postgresql-prisma, feat/SMP-116-setup-sonarqube]
  pull_request:
    branches: [main, develop, feat/SMP-54-add-postgresql-prisma, feat/SMP-116-setup-sonarqube]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # CHANGE DETECTION
  # ========================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      api: ${{ steps.filter.outputs.api }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flutter:
              - 'bagtrip/**'
              - '.github/workflows/ci.yml'
            api:
              - 'api/**'
              - '.github/workflows/ci.yml'
            admin:
              - 'admin-panel/**'
              - '.github/workflows/ci.yml'

  # ========================================
  # FLUTTER — ANALYZE + FORMAT
  # ========================================
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.flutter == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('bagtrip/pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        working-directory: bagtrip
        run: flutter pub get

      - name: Analyze
        working-directory: bagtrip
        run: flutter analyze

      - name: Check formatting
        working-directory: bagtrip
        run: dart format --set-exit-if-changed .

  # ========================================
  # FLUTTER — TEST + COVERAGE
  # ========================================
  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.flutter == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('bagtrip/pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        working-directory: bagtrip
        run: flutter pub get

      - name: Run tests with coverage
        working-directory: bagtrip
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: bagtrip/coverage/lcov.info
          retention-days: 7

      - name: Check coverage threshold
        working-directory: bagtrip
        run: |
          sudo apt-get install -y lcov > /dev/null 2>&1
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: *\([0-9.]*\)%.*/\1/')
          echo "Line coverage: ${COVERAGE}%"
          echo "## Flutter Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Line coverage: **${COVERAGE}%** (threshold: 30%)" >> $GITHUB_STEP_SUMMARY
          if [ "$(echo "$COVERAGE < 30" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 30% threshold"
            exit 1
          fi

  # ========================================
  # API — LINT + TEST
  # ========================================
  api-checks:
    name: API Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('api/uv.lock') }}
          restore-keys: uv-

      - name: Install dependencies
        working-directory: api
        run: uv sync

      - name: Lint (ruff check)
        working-directory: api
        run: uv run ruff check src/

      - name: Format check (ruff format)
        working-directory: api
        run: uv run ruff format --check src/

      - name: Run tests with coverage
        working-directory: api
        run: uv run pytest --cov=src --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
          retention-days: 7

  # ========================================
  # ADMIN-PANEL — LINT + TEST + COVERAGE
  # ========================================
  admin-checks:
    name: Admin Panel Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/application/package-lock.json

      - name: Install dependencies
        working-directory: admin-panel/application
        run: npm ci

      - name: Type check
        working-directory: admin-panel/application
        run: npm run type-check

      - name: Lint
        working-directory: admin-panel/application
        run: npm run lint

      - name: Run tests with coverage
        working-directory: admin-panel/application
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin-panel/application/coverage/lcov.info
          retention-days: 7

  # ========================================
  # SONAR — QUALITY ANALYSIS
  # ========================================
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [flutter-test, api-checks, admin-checks]
    if: always() && (needs.flutter-test.result == 'success' || needs.api-checks.result == 'success' || needs.admin-checks.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Flutter coverage
        uses: actions/download-artifact@v4
        if: needs.flutter-test.result == 'success'
        with:
          name: flutter-coverage
          path: bagtrip/coverage

      - name: Download API coverage
        uses: actions/download-artifact@v4
        if: needs.api-checks.result == 'success'
        with:
          name: api-coverage
          path: api

      - name: Download Admin Panel coverage
        uses: actions/download-artifact@v4
        if: needs.admin-checks.result == 'success'
        with:
          name: admin-coverage
          path: admin-panel/application/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ========================================
  # QUALITY GATE
  # ========================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [flutter-analyze, flutter-test, api-checks, admin-checks, sonar]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "flutter-analyze: ${{ needs.flutter-analyze.result }}"
          echo "flutter-test:    ${{ needs.flutter-test.result }}"
          echo "api-checks:      ${{ needs.api-checks.result }}"
          echo "admin-checks:    ${{ needs.admin-checks.result }}"

          for result in \
            "${{ needs.flutter-analyze.result }}" \
            "${{ needs.flutter-test.result }}" \
            "${{ needs.api-checks.result }}" \
            "${{ needs.admin-checks.result }}" \
            "${{ needs.sonar.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Quality gate FAILED"
              exit 1
            fi
          done

          echo "Quality gate PASSED"

  # ========================================
  # REPORT
  # ========================================
  report:
    name: CI Report
    runs-on: ubuntu-latest
    needs: [flutter-analyze, flutter-test, api-checks, admin-checks, quality-gate]
    if: always()
    steps:
      - name: Generate summary
        run: |
          status() {
            case "$1" in
              success) echo "Passed" ;;
              skipped) echo "Skipped" ;;
              *) echo "Failed" ;;
            esac
          }

          echo "## CI/CD Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter Analyze | $(status "${{ needs.flutter-analyze.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter Test | $(status "${{ needs.flutter-test.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| API Checks | $(status "${{ needs.api-checks.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Panel | $(status "${{ needs.admin-checks.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.quality-gate.result }}" == "success" ]]; then
            echo "**Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
