# Configuration Ruff pour le linting et le formatage Python
line-length = 100
target-version = "py313"

[lint]
# Activer les règles recommandées
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # Pyflakes
  "I",   # isort
  "N",   # pep8-naming
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
]

# Ignorer certaines règles
ignore = [
  "E501", # line too long (géré par formatter)
  "B008", # do not perform function calls in argument defaults
  "N815", # Variable in class scope should not be mixedCase (pour les types Amadeus qui doivent correspondre à l'API externe)
  "N803", # Argument name should be lowercase (pour les paramètres d'API qui doivent correspondre à l'API externe)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in __init__.py

[lint.isort]
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
