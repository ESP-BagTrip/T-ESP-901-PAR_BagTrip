minimum_pre_commit_version: "3.0.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: api-lint-format
        name: "api: ruff format && ruff check"
        entry: bash -lc 'cd api && uv run ruff format src/ && uv run ruff check src/'
        language: system
        pass_filenames: false
        files: ^api/
      - id: api-mypy
        name: "api: mypy src/"
        entry: bash -lc 'cd api && uv run mypy src/'
        language: system
        pass_filenames: false
        files: ^api/(src|pyproject\.toml)/.*\.(py|toml)$
      - id: api-bandit
        name: "api: bandit -r src/ -ll (medium+)"
        entry: bash -lc 'cd api && uv run bandit -c pyproject.toml -r src/ --severity-level medium --confidence-level medium'
        language: system
        pass_filenames: false
        files: ^api/(src|pyproject\.toml)/.*\.(py|toml)$
      - id: mobile-lint-format
        name: "mobile: flutter analyze && dart format ."
        entry: bash -lc 'cd bagtrip/ && flutter analyze && dart format .'
        language: system
        pass_filenames: false
        files: ^bagtrip/
      - id: admin-lint-format
        name: "admin: prettier && eslint --fix && tsc --noEmit"
        entry: bash -lc 'cd admin-panel && npm run format && npm run lint:fix && rm -rf .next/types && npm run type-check'
        language: system
        pass_filenames: false
        files: ^admin-panel/
