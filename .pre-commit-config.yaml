minimum_pre_commit_version: "3.0.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: api-lint-format
        name: "api: ruff format && ruff check --fix"
        entry: bash -lc 'cd api && uv run ruff format src/ && uv run ruff check --fix src/'
        language: system
        pass_filenames: false
      - id: admin-panel-lint-format
        name: "admin-panel: npm run format && npm run lint:fix"
        entry: bash -lc 'cd admin-panel/application && [ ! -d node_modules ] && npm install || true; npm run format && npm run lint:fix'
        language: system
        pass_filenames: false
      - id: mobile-lint-format
        name: "mobile: dart format && dart fix --apply && flutter analyze"
        entry: bash -lc 'cd bagtrip/ && dart format . && dart fix --apply . && flutter analyze'
        language: system
        pass_filenames: false
        types: [dart]
        stages: [commit]
