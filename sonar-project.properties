# General project properties
sonar.host.url=http://sonar.bagtrip.fr
sonar.projectKey=ESP-BagTrip_T-ESP-901-PAR_BagTrip
sonar.projectName=BagTrip
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Coverage reports (à la racine)
sonar.python.coverage.reportPaths=api/coverage.xml
sonar.javascript.lcov.reportPaths=admin-panel/application/coverage/lcov.info
sonar.dart.lcov.reportPaths=bagtrip/coverage/lcov.info

# Sources and Tests from project root
sonar.sources=.
sonar.inclusions=api/src/**,admin-panel/application/src/**,bagtrip/lib/**
sonar.tests=.
sonar.test.inclusions=api/tests/**,bagtrip/test/**

# Exclusions from Code Analysis (Quality)
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,bagtrip/lib/gen/**,**/__pycache__/**,**/.next/**,**/node_modules/**,**/build/**,**/.dart_tool/**,**/.pytest_cache/**,admin-panel/application/cypress/**,api/tests/**,bagtrip/test/**

# Exclusions from Coverage (will not count towards the 53% denominator)
sonar.coverage.exclusions=\
  api/src/migrations/**,\
  api/src/seeds/**,\
  admin-panel/application/src/__tests__/**,\
  admin-panel/application/src/types/**,\
  admin-panel/application/src/features/registry.ts,\
  admin-panel/application/src/app/layout.tsx,\
  bagtrip/lib/gen/**,\
  bagtrip/lib/l10n/**,\
  bagtrip/lib/firebase_options.dart,\
  bagtrip/lib/design/**,\
  **/*.g.dart,\
  **/*.freezed.dart
