# General project properties
sonar.projectKey=ESP-BagTrip_T-ESP-901-PAR_BagTrip
sonar.projectName=BagTrip
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8
sonar.organization=esp-bagtrip

# Modules
sonar.modules=api,admin-panel,bagtrip

# API properties
api.sonar.projectName=API
api.sonar.projectBaseDir=api
api.sonar.sources=src
api.sonar.tests=tests
api.sonar.python.coverage.reportPaths=coverage.xml
api.sonar.language=py
api.sonar.exclusions=**/venv/**,**/.venv/**,**/*.pyc,**/__pycache__/**,**/*.spec.py,**/migrations/**,**/seeds/**


# Admin Panel properties
admin-panel.sonar.projectName=Admin Panel
admin-panel.sonar.projectBaseDir=admin-panel/application
admin-panel.sonar.sources=src
admin-panel.sonar.language=ts
admin-panel.sonar.exclusions=**/node_modules/**,**/.next/**,**/cypress/**,**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx,**/*.config.ts,**/*.config.js
admin-panel.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Mobile properties
bagtrip.sonar.projectName=Bagtrip
bagtrip.sonar.projectBaseDir=bagtrip
bagtrip.sonar.sources=lib
bagtrip.sonar.tests=test
bagtrip.sonar.exclusions=**/gen/**,**/l10n/**,**/generated/**,**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/firebase_options.dart,**/web/**,**/android/**,**/ios/**,**/macos/**,**/linux/**,**/windows/**
bagtrip.sonar.dart.coverage.reportPaths=coverage/lcov.info
