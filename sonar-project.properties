# General project properties
sonar.projectKey=BagTrip
sonar.projectName=BagTrip
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Define modules
sonar.modules=api,admin-panel,bagtrip

# API (backend) properties
api.sonar.projectName=API
api.sonar.projectBaseDir=api
api.sonar.sources=src
api.sonar.language=ts
api.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts
api.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Admin Panel (back-office) properties
admin-panel.sonar.projectName=Admin Panel
admin-panel.sonar.projectBaseDir=admin-panel/application
admin-panel.sonar.sources=src
admin-panel.sonar.language=ts
admin-panel.sonar.exclusions=**/node_modules/**,**/.next/**,**/cypress/**,**/*.spec.ts,**/*.test.ts
admin-panel.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Bagtrip (frontend) properties
bagtrip.sonar.projectName=Bagtrip
bagtrip.sonar.projectBaseDir=bagtrip
bagtrip.sonar.sources=lib
bagtrip.sonar.language=dart
bagtrip.sonar.exclusions=**/generated/**,**/*.g.dart
