# General project properties
sonar.projectKey=ESP-BagTrip_T-ESP-901-PAR_BagTrip
sonar.projectName=BagTrip
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Source folders from all modules
sonar.sources=api/src,admin-panel/src,bagtrip/lib
sonar.tests=api/tests,bagtrip/test,admin-panel/src

# Test file patterns (co-located tests in admin-panel)
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions: generated code, build artifacts, platform scaffolding.
# Only exclude files that are NOT hand-written source code.
sonar.exclusions=\
  **/venv/**,**/.venv/**,**/*.pyc,**/__pycache__/**,\
  **/node_modules/**,**/.next/**,**/cypress/**,\
  **/migrations/**,**/seeds/**,\
  **/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,\
  bagtrip/lib/gen/**,bagtrip/lib/l10n/app_localizations*.dart,bagtrip/lib/firebase_options.dart,\
  bagtrip/web/**,bagtrip/android/**,bagtrip/ios/**,bagtrip/macos/**,bagtrip/linux/**,bagtrip/windows/**

# Coverage reports (paths relative to root)
sonar.python.coverage.reportPaths=api/coverage.xml
sonar.javascript.lcov.reportPaths=admin-panel/coverage/lcov.info
sonar.dart.lcov.reportPaths=bagtrip/coverage/lcov.info
