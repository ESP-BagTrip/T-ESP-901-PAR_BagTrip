# General project properties
sonar.projectKey=ESP-BagTrip_T-ESP-901-PAR_BagTrip
sonar.projectName=BagTrip
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Sources & tests
# ---------------------------------------------------------------------------
# Only include languages that the SonarQube instance can actually analyze.
# SonarQube Community Edition does NOT ship a Dart/Flutter analyzer.
# Including bagtrip/lib without the plugin causes every Dart file to report
# 0% coverage, dragging the project average to ~1%.
#
# admin-panel uses co-located tests (src/**/*.test.ts). These are kept in
# sonar.sources with sonar.test.inclusions to identify which files are tests.
# They must NOT appear in sonar.tests simultaneously (double-counting).
# ---------------------------------------------------------------------------
sonar.sources=api/src,admin-panel/src
sonar.tests=api/tests

# Co-located test patterns (admin-panel keeps tests next to source)
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions: generated code, build artifacts, platform scaffolding.
sonar.exclusions=\
  **/venv/**,**/.venv/**,**/*.pyc,**/__pycache__/**,\
  **/node_modules/**,**/.next/**,**/cypress/**,\
  **/migrations/**,**/seeds/**

# ---------------------------------------------------------------------------
# Coverage reports (paths relative to project root)
# ---------------------------------------------------------------------------
sonar.python.coverage.reportPaths=api/coverage.xml
sonar.javascript.lcov.reportPaths=admin-panel/coverage/lcov.info

# ---------------------------------------------------------------------------
# Coverage exclusions
# ---------------------------------------------------------------------------
# Exclude from coverage ratio computation files that have no testable logic
# or are vendored / auto-generated. These files are still analyzed for code
# smells and security issues — only the coverage denominator is adjusted.
#
#   api/src/main.py          FastAPI app factory — bootstrap only, no logic
#   api/src/config/env.py    Pydantic Settings module — pure configuration
#   admin-panel ui/**        shadcn/ui vendored components (copy-paste DS)
#   admin-panel app/dev/**   Dev-only tooling pages, not shipped to prod
# ---------------------------------------------------------------------------
sonar.coverage.exclusions=\
  api/src/main.py,\
  api/src/config/env.py,\
  admin-panel/src/components/ui/**,\
  admin-panel/src/app/app/dev/**

# ---------------------------------------------------------------------------
# Flutter / Dart — excluded from analysis
# ---------------------------------------------------------------------------
# If the Dart plugin is installed on the SonarQube instance, uncomment:
#   sonar.sources=api/src,admin-panel/src,bagtrip/lib
#   sonar.tests=api/tests,bagtrip/test
#   sonar.dart.lcov.reportPaths=bagtrip/coverage/lcov.info
# and re-add Dart exclusions:
#   **/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,
#   bagtrip/lib/gen/**,bagtrip/lib/l10n/app_localizations*.dart,
#   bagtrip/lib/firebase_options.dart,
#   bagtrip/web/**,bagtrip/android/**,bagtrip/ios/**,
#   bagtrip/macos/**,bagtrip/linux/**,bagtrip/windows/**
